; #ecc43f = (directly because file exists only on)
#ff79c6 = (?i)\[\b(error|fail|warn|debug|info|critical|note|warning)\b\](*SKIP)(*FAIL)|(\[([^\[\]]|(?2))*\])
#009ed2 = (\w+:)?\.?[\\\/]+(?:\S+|[ \w]+[.\\\/])+

