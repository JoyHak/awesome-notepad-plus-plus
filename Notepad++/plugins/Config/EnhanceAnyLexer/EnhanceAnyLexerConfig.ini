; group
#317333 = (?-i)(?<!\\)\\[\dkg]|\$\d
; anchor
#967036 = (?-i)(?<!\\)\\[GKAZz]

; word
#f5dc4b = (?<!\\)\\[wlu]
; digit
#8080ff = (?<!\\)\\d
; Braces { } or brackets [ ] and digits: {,2}
#0daa9e = (?<![\\xp])[\{\[][,\d]+[\}\]]

[autohotkey]
