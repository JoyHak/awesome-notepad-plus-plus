[ini+regex]
; highlight RegEx using... RegEx!

; escape char
#a601fe = \\.

; escape special 
#569544 = (?<!\\)\\[a-z]
; literals
#a601fe = (?-i)(?<!\\)\\Q.+\\E
; hexadecimal escape sequence
#a601fe = (?-i)(?<!\\)\\x(\d{2}|\{\d{4}\})
; octal escape sequence
#a601fe = (?<!\\)\\0\d{3}

; group 
#317333 = (?-i)(?<!\\)\\[\dkg]|\$\d
; anchor
#967036 = (?-i)(?<!\\)\\[GKAZz]

; word 
#f5dc4b = (?<!\\)\\[wlu]
; digit 
#8080ff = (?<!\\)\\d
; Braces { } or brackets [ ] and digits: {,2}
#8080ff = (?<![\\xp])[\{\[][,\d]+[\}\]]