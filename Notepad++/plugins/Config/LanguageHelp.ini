[Options]
StayOnTop=0
HelpMenuMode=3
HelpMenuSearchWord=0
ShowToolBarButton=0
ShowContextMenuEntry=1
ShowContextMenuEntryOnTop=1
ShowMenuIcons=0
[MSDN]
Mask=*.cpp;*.h
File=$nppdir$\helpDocumentation\win32.chm
Show=1
[Online MSDN]
Mask=*.
File=https://learn.microsoft.com/en-us/search/?category=Documentation&terms=$word$
Show=1
[Powershell]
Mask=*.ps1;*.psm1
File=https://learn.microsoft.com/en-us/search/?category=Reference&terms=$word$
Show=1
[AutoHotkey]
Mask=*.ahk;*.ah2;*.ahk2
File=$nppdir$\helpDocumentation\AutoHotkey.chm
Show=1
[Xyplorer]
Mask=*.xys;*.xy
File=$nppdir$\helpDocumentation\Xyplorer.chm
Show=1
[C++]
Mask=*.cpp;*.h;*.hpp;*.cxx
File=https://cplusplus.com/$word$
Show=1
